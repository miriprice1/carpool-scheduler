services:
  - type: web
    name: carpool-scheduler
    env: python
    plan: starter          # Starter ($7/mo) required for persistent disk
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: GOOGLE_MAPS_API_KEY
        sync: false          # Set manually in Render dashboard — never stored in git
      - key: WORKPLACE_NAME
        sync: false
      - key: WORKPLACE_LAT
        sync: false
      - key: WORKPLACE_LNG
        sync: false
      - key: DATA_DIR
        value: /data
    disk:
      name: carpool-state
      mountPath: /data       # state.json lives here, survives redeploys
      sizeGB: 1
